# Deploy on the VPS behind the existing Traefik (network "proxy", certresolver "myresolver").
# Put the app secrets + APP_URL in a .env file next to this compose, then:
#   docker compose up -d --build
services:
  app:
    build: .
    image: turkce:latest
    restart: unless-stopped
    env_file: .env
    networks: [proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.turkce.rule=Host(`turkce.mohammed518.com`)"
      - "traefik.http.routers.turkce.entrypoints=websecure"
      - "traefik.http.routers.turkce.tls=true"
      - "traefik.http.routers.turkce.tls.certresolver=myresolver"
      - "traefik.http.services.turkce.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
